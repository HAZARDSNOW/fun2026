name: Multi-Channel Fetcher

on:
  schedule:
    - cron: '0 0,4,8,16 * * *'
  workflow_dispatch:

jobs:
  update_logs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Fetch and Clean Data with Python
        run: |
          import xml.etree.ElementTree as ET
          import urllib.request
          from datetime import datetime
          import os
          
          CHANNELS = ["asrnovin_ir", "golboo1", "sillymohsen", "sootehdelan333"]
          DATE = datetime.now().strftime('%Y-%m-%d_%H-%M')
          
          os.makedirs('logs', exist_ok=True)
          
          for CHANNEL in CHANNELS:
            os.makedirs(f'logs/{CHANNEL}', exist_ok=True)
            filename = f'logs/{CHANNEL}/{CHANNEL}_{DATE}.txt'
            
            print(f"Fetching data for @{CHANNEL}...")
            
            try:
              # دریافت XML
              url = f"https://summary-engine.hidrosummaryaibot.workers.dev/?channel={CHANNEL}"
              with urllib.request.urlopen(url, timeout=30) as response:
                xml_data = response.read().decode('utf-8')
              
              # پردازش XML
              root = ET.fromstring(xml_data)
              items = root.findall('.//item')
              
              print(f"  Found {len(items)} items in XML")
              
              with open(filename, 'w', encoding='utf-8') as f:
                f.write(f"--- {CHANNEL} | {DATE} ---\n")
                
                for item in items:
                  date_elem = item.find('pubDate')
                  desc_elem = item.find('description')
                  
                  if date_elem is not None and desc_elem is not None:
                    date = date_elem.text
                    content = desc_elem.text
                    
                    # حذف CDATA wrapper اگه باشه
                    if content and content.startswith('<![CDATA['):
                      content = content[9:-3]
                    
                    f.write(f"Date: {date}\n")
                    f.write(f"Content: {content}\n")
                    f.write(f"---\n")
              
              # شمارش آیتم‌ها
              with open(filename, 'r', encoding='utf-8') as f:
                count = sum(1 for line in f if line.startswith('Date:'))
              
              print(f"✅ Saved {count} items for @{CHANNEL}")
              
            except Exception as e:
              print(f"⚠️ Error for @{CHANNEL}: {e}")
          
          # حذف فایل‌های قدیمی
          os.system('find logs/ -type f -mtime +2 -delete 2>/dev/null')
        shell: python

      - name: Commit and Push
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add logs/
          if ! git diff --cached --quiet; then
            git commit -m "Sync logs: $(date +'%Y-%m-%d %H:%M')"
            git push
          else
            echo "No changes to commit"
          fi
