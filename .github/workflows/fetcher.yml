name: Multi-Channel Fetcher

on:
  workflow_dispatch:  # برای تست دستی
  schedule:
    - cron: '0 */4 * * *'

jobs:
  update_logs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Fetch All Posts From Worker
        run: |
          CHANNELS=("asrnovin_ir")
          DATE=$(date +'%Y-%m-%d_%H-%M')
          
          mkdir -p logs
          
          for CHANNEL in "${CHANNELS[@]}"; do
            mkdir -p "logs/$CHANNEL"
            FILENAME="logs/$CHANNEL/${CHANNEL}_$DATE.txt"
            
            echo "--- $CHANNEL | $DATE ---" > "$FILENAME"
            
            # دریافت کامل XML از ورکر
            curl -sL "https://summary-engine.hidrosummaryaibot.workers.dev/?channel=$CHANNEL" -o temp.xml
            
            # استخراج همه آیتم‌ها با روش ساده و مطمئن
            # هر آیتم رو جداگانه پردازش می‌کنیم
            csplit -sz -f item_ temp.xml '/<\/item>/' '{*}' 2>/dev/null
            
            for item_file in item_*; do
              if [ -f "$item_file" ]; then
                # استخراج date
                DATE_LINE=$(grep -o '<pubDate>.*</pubDate>' "$item_file" | sed 's/<pubDate>//;s/<\/pubDate>//')
                
                # استخراج content (حذف CDATA و خطوط جدید)
                CONTENT=$(grep -o '<description>.*</description>' "$item_file" | sed 's/<description>//;s/<\/description>//;s/<!\[CDATA\[//;s/\]\]>//')
                
                if [ -n "$DATE_LINE" ] && [ -n "$CONTENT" ]; then
                  echo "Date: $DATE_LINE" >> "$FILENAME"
                  echo "Content: $CONTENT" >> "$FILENAME"
                  echo "---" >> "$FILENAME"
                fi
                rm -f "$item_file"
              fi
            done
            
            ITEM_COUNT=$(grep -c "^Date:" "$FILENAME")
            echo "✅ Saved $ITEM_COUNT items for @$CHANNEL"
            
            rm -f temp.xml
          done
          
          # حذف فایل‌های قدیمی
          find logs/ -type f -mtime +2 -delete 2>/dev/null

      - name: Commit and Push
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add logs/
          if ! git diff --cached --quiet; then
            git commit -m "Sync logs: $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
