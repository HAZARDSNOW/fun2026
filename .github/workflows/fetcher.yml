name: Multi-Channel Fetcher

on:
  schedule:
    - cron: '0 0,4,8,16 * * *'
  workflow_dispatch:

jobs:
  update_logs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Fetch and Clean Data
        run: |
          # لیست کانال‌ها
          CHANNELS=("asrnovin_ir")
          DATE=$(date +'%Y-%m-%d_%H-%M')
          
          mkdir -p logs
          
          for CHANNEL in "${CHANNELS[@]}"; do
            mkdir -p "logs/$CHANNEL"
            FILENAME="logs/$CHANNEL/${CHANNEL}_$DATE.txt"
            
            echo "Fetching data for @$CHANNEL..."
            curl -sL --max-time 30 "https://summary-engine.hidrosummaryaibot.workers.dev/?channel=$CHANNEL" -o temp_rss.xml
            
            if [ -s temp_rss.xml ]; then
              echo "--- $CHANNEL | $DATE ---" > "$FILENAME"
              
              # روش جدید: پردازش خط به خط با حفظ متن کامل چندخطی
              awk '
              BEGIN { RS = "</item>"; FS = "\n" }
              {
                date = ""
                content = ""
                full_content = ""
                in_cdata = 0
                
                for (i = 1; i <= NF; i++) {
                  line = $i
                  
                  # استخراج pubDate
                  if (match(line, /<pubDate>(.*)<\/pubDate>/, arr)) {
                    date = arr[1]
                  }
                  
                  # شروع CDATA
                  if (line ~ /<description><!\[CDATA\[/) {
                    in_cdata = 1
                    # استخراج بخش اول بعد از CDATA[
                    sub(/.*<!\[CDATA\[/, "", line)
                    full_content = line
                  }
                  # داخل CDATA (خطوط میانی)
                  else if (in_cdata && line !~ /\]\]><\/description>/) {
                    full_content = full_content "\n" line
                  }
                  # پایان CDATA
                  else if (in_cdata && line ~ /\]\]><\/description>/) {
                    sub(/\].*/, "", line)
                    full_content = full_content "\n" line
                    in_cdata = 0
                    # حذف whitespace اضافی از اول و آخر
                    gsub(/^[[:space:]]+|[[:space:]]+$/, "", full_content)
                    content = full_content
                  }
                }
                
                if (date != "" && content != "") {
                  print "Date: " date
                  print "Content: " content
                  print "---"
                }
              }
              ' temp_rss.xml >> "$FILENAME"
              
              ITEM_COUNT=$(grep -c "^Date:" "$FILENAME" 2>/dev/null || echo "0")
              echo "Saved $ITEM_COUNT items for @$CHANNEL"
            else
              echo "⚠️ Warning: Empty response for @$CHANNEL"
            fi
            
            rm -f temp_rss.xml
          done
          
          # مدیریت حجم فایل‌ها
          if [ -d logs ]; then
            find logs/ -type f -mtime +2 -delete 2>/dev/null
          fi

      - name: Commit and Push
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add logs/
          if ! git diff --cached --quiet; then
            git commit -m "Sync logs: $(date +'%Y-%m-%d %H:%M')"
            git push
          else
            echo "No changes to commit"
          fi
